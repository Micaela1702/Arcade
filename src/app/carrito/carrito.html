<div class="cart-container rounded-3 p-3 shadow-sm">
  <h3 class="cart-title">🛒 Carrito de compras</h3>
  <ul class="cart-list mb-0 p-0">
    @for (juego of cartList$ | async; track juego.name) {
    <li class="cart-item d-flex justify-content-between align-items-center rounded-2 mb-2 px-3 py-2">
      <span class="item-name fw-bold">{{ juego.name }}</span>
      <div class="d-flex align-items-center gap-3">
        <span class="badge rounded-pill item-badge">{{ juego.quantity }}</span>
        <button
          class="btn p-0 border-0 btn-remove d-flex align-items-center"
          (click)="removeOneFromCart(juego.name)"
          [disabled]="juego.quantity <= 0"
        >
          <i class="bi bi-trash3-fill"></i>
        </button>
      </div>
    </li>
    } @empty {
    <li class="cart-empty-text text-center py-3 border-0 bg-transparent">
      Tu inventario está vacío. ¡Añadí algún juego!
    </li>
    }
  </ul>
</div>
