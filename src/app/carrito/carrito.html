<div class="cart-container">
  <h3>🛒 Carrito de compras</h3>
  <ul class="cart-list">
    @for (juego of cartList$ | async; track juego.name) {
    <li>
      <span>{{ juego.name }}</span>
      <div style="display: flex; align-items: center; gap: 10px;">
        <span class="cart-quantity">{{ juego.quantity }}</span>

        <!-- Botón con emoji -->
        <button
          class="remove-btn"
          (click)="removeOneFromCart(juego.name)"
          [disabled]="juego.quantity <= 0"
        >
          ➖
        </button>
      </div>
    </li>
    }
  </ul>
</div>
