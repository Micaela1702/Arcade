<div class="input-group input-group-sm custom-quantity-selector">
  <!-- Botón de Restar (-) -->
  <button class="btn btn-outline-secondary" type="button" (click)="downQuantity()">
    <i class="bi bi-dash-lg"></i>
  </button>

  <!-- Input del Número (Cantidad) -->
  <input type="number"
         class="form-control text-center fw-bold"
         [(ngModel)]="quantity"
         (keyup)="changeQuantity($event)"
         min="0"
         [max]="max"
         />

  <!-- Botón de Sumar (+) -->
  <button class="btn btn-outline-secondary" type="button" (click)="upQuantity()">
    <i class="bi bi-plus-lg"></i>
  </button>
</div>
