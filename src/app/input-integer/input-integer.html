<div class="custom-quantity-selector">
  <!-- Botón de Restar -->
  <button class="quantity-btn" type="button" (click)="downQuantity()">
    <i class="bi bi-dash-lg"></i>
  </button>

  <!-- Input del Número (Cantidad) -->
  <input type="number"
         class="quantity-input text-center fw-bold"
         [(ngModel)]="quantity"
         (keyup)="changeQuantity($event)"
         min="0"
         [max]="max"
         />

  <!-- Botón de Sumar -->
  <button class="quantity-btn" type="button" (click)="upQuantity()">
    <i class="bi bi-plus-lg"></i>
  </button>
</div>
